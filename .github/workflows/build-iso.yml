name: Build VyOS Stream 2026.03
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout VyOS Build Repo (Stream 2026.03)
        uses: actions/checkout@v4
        with:
          repository: vyos/vyos-build
          ref: 'circinus-2026.03'   # ← pinned to the exact Stream release tag

      - name: Pull VyOS build container
        run: docker pull vyos/vyos-build:current

      - name: Build ISO
        run: |
          docker run --rm --privileged \
            -v "$(pwd)":/vyos \
            -w /vyos \
            vyos/vyos-build:current \
            sudo ./build-vyos-image iso \
              --architecture amd64 \
              --build-by 'GitHub-Actions-Builder' \
              --build-type release

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VyOS-Stream-2026.03-amd64
          path: build/*.iso
          retention-days: 7
