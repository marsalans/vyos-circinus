name: Build VyOS 1.5 VPP-Enabled
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Fixes the Node.js deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout VyOS Build Repo
        uses: actions/checkout@v4
        with:
          repository: vyos/vyos-build
          # 'current' is the branch for VyOS 1.5 (Circinus) which has VPP
          ref: 'current' 

      - name: Set up Docker
        run: sudo apt-get update && sudo apt-get install -y docker.io

      - name: Build ISO
        run: |
          # Build the container for the 1.5/Current branch
          docker build -t vyos/vyos-build:current docker
          
          # Run the build. 
          # Note: VPP is included by default in the 'current' 1.5 builds.
          docker run --rm --privileged -v $(pwd):/vyos -w /vyos vyos/vyos-build:current \
          bash -c "./build-vyos-image iso --architecture amd64 --build-by 'Arsalan-ISP-VPP'"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: VyOS-1.5-VPP-Experimental
          path: build/*.iso
