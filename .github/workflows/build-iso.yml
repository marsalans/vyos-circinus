name: Build VyOS 1.5 VPP-2026.03
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Fixes the Node.js deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout VyOS Build Repo
        uses: actions/checkout@v4
        with:
          repository: vyos/vyos-build
          ref: 'current' # 1.5/Circinus branch for VPP

      - name: Set up Docker
        run: sudo apt-get update && sudo apt-get install -y docker.io

      - name: Build ISO with Fix for Error 100
        run: |
          # 1. Build the environment
          docker build -t vyos/vyos-build:current docker
          
          # 2. Run build with a "Fix-Missing" flag to prevent Error 100
          # This command cleans the apt cache inside the container before starting
          docker run --rm --privileged -v $(pwd):/vyos -w /vyos vyos/vyos-build:current \
          bash -c "apt-get update --fix-missing && ./build-vyos-image iso --architecture amd64 --build-by 'Arsalan-ISP-VPP'"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: VyOS-1.5-VPP-Stream
          path: build/*.iso
